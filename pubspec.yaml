name: fix_my_street
description: "FixMyStreet AI — Urban Maintenance Reporting for Ras Al Khaimah."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # AI (Groq via OpenAI-compatible REST)
  http: ^1.2.2

  # Database
  mongo_dart: ^0.10.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Camera / Image
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  google_maps_flutter: ^2.17.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
